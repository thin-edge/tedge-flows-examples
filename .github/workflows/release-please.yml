name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          # Use a PAT or GitHub App token so that release-please PRs trigger
          # CI workflows. PRs opened by GITHUB_TOKEN are intentionally blocked
          # from triggering other workflows by GitHub.
          # Create a fine-grained PAT with Contents + Pull requests (read/write)
          # and store it as the RELEASE_PLEASE_TOKEN repo secret.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      REGISTRY: ghcr.io
      OWNER: ${{ github.repository_owner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          cache: "npm"
          cache-dependency-path: "package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build-all

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.OWNER }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v6
        with:
          go-version: "stable"
          cache: false

      - name: Install tedge-oscar
        run: go install github.com/thin-edge/tedge-oscar@latest

      - name: Publish
        run: npm run publish -- --target registry

      - name: Upload artifacts to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for tarball in dist/*.tar.gz; do
            filename=$(basename "$tarball" .tar.gz)
            # Decode %2F mapper prefix if present: e.g. local%2Flog-surge_1.3.2 -> log-surge_1.3.2
            name_version="${filename##*%2F}"
            name="${name_version%_*}"
            version="${name_version##*_}"
            tag="${name}-v${version}"
            echo "Uploading $tarball to release $tag"
            gh release upload "$tag" "$tarball" --clobber || echo "Warning: release $tag not found, skipping"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: flows
          path: ./dist/*.tar.gz
