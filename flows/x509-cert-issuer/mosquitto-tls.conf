# Mosquitto listener requiring x509 client certificate authentication.
# The CA cert (ca-cert.pem) is the same one used by the x509-cert-issuer flow
# to sign device certificates, so any device that received a certificate from
# the issuer will be trusted here automatically.

# TLS listener on port 8883
listener 8883

# CA certificate used to verify connecting client certificates.
# Certificates issued by the x509-cert-issuer flow are signed by this CA.
cafile /opt/homebrew/etc/mosquitto/certs/ca-cert.pem

# Server certificate and private key.
# Replace with a certificate/key issued for this broker's hostname.
# You can use the x509-cert-issuer flow to generate one, then update these paths.
certfile /opt/homebrew/etc/mosquitto/certs/device-cert.pem
keyfile /opt/homebrew/etc/mosquitto/certs/device-private.pem

# Require clients to present a valid certificate signed by the CA above.
require_certificate true

# Use the certificate's Common Name (CN) as the MQTT client username.
# This lets you apply per-device ACL rules based on the CN.
use_identity_as_username true

# Optional: restrict which TLS versions and ciphers are accepted.
# tls_version tlsv1.3
