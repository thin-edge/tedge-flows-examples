[input.mqtt]
topics = ["te/pki/x509/csr", "te/pki/x509/keygen"]

[config]
debug = "${.params.debug}"
ca_private_key = "${.params.ca_private_key}"
ca_cert_der = "${.params.ca_cert_der}"
factory_ca_public_keys = "${.params.factory_ca_public_keys}"
cert_validity_days = "${.params.cert_validity_days}"
nonce_window_hours = "${.params.nonce_window_hours}"
require_factory_cert = "${.params.require_factory_cert}"
keygen_topic = "${.params.keygen_topic}"
output_cert_topic_prefix = "${.params.output_cert_topic_prefix}"
output_keygen_topic_prefix = "${.params.output_keygen_topic_prefix}"
output_rejected_topic = "${.params.output_rejected_topic}"

[[steps]]
script = "lib/main.js"
